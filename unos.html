<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroTrails - Unos Članka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <span class="logo-main">EURO</span>
                <span class="logo-sub">TRAILS</span>
            </div>
            
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="#">DESTINACIJE</a></li>
                    <li><a href="#">SAVJETI</a></li>
                    <li><a href="unos.html" class="active">UNOS</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="form-section">
            <h2 class="section-title-form">Unos novog putopisa</h2>
            
            <form action="skripta.php" method="POST" enctype="multipart/form-data" name="unos_vijesti">                
                <div class="form-item">
                    <label for="title">Naslov članka / destinacije</label>
                    <div class="form-field">
                        <input type="text" id="title" name="title" class="form-field-textual" required autofocus>
                    </div>
                </div>

                <div class="form-item">
                    <label for="about">Kratki sadržaj (do 50 znakova)</label>
                    <div class="form-field">
                        <textarea name="about" id="about" cols="30" rows="3" class="form-field-textual" maxlength="50" required></textarea>
                    </div>
                </div>

                <div class="form-item">
                    <label for="content">Sadržaj putopisa</label>
                    <div class="form-field">
                        <textarea name="content" id="content" cols="30" rows="10" class="form-field-textual" required></textarea>
                    </div>
                </div>

                <div class="form-item">
                    <label for="pphoto">Slika (iz mape img/):</label>
                    <div class="form-field">
                        <input type="file" id="pphoto" name="pphoto" accept="image/jpg,image/jpeg,image/gif" required>
                    </div>
                </div>

                <div class="form-item">
                    <label for="category">Regija / Kategorija</label>
                    <div class="form-field">
                        <select name="category" id="category" class="form-field-textual" required>
                            <option value="Srednja Europa">Srednja Europa</option>
                            <option value="Regija i Jug">Regija i Jug</option>
                        </select>
                    </div>
                </div>

                <div class="form-item checkbox-item">
                    <label>
                        <input type="checkbox" name="archive" id="archive" value="1">
                        Spremiti u arhivu (ne prikazuj na početnoj)
                    </label>
                </div>

                <div class="form-item button-group">
                    <button type="reset" value="Poništi" class="btn-reset">Poništi</button>
                    <button type="submit" value="Prihvati" class="btn-submit">Prihvati</button>
                </div>

            </form>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Sven Grgić | Kontakt: <a href="mailto:sgrgic1@tvz.hr">sgrgic1@tvz.hr</a></p>
    </footer>

</body>
</html>
